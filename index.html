<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de mi Novela</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #1a120c; 
        }

        /* Botón de Música */
        #controles-musica {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #c5a059;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1;
        }

        /* --- NUEVO: Botón de Crónicas --- */
        #boton-cronicas {
            position: fixed;
            top: 20px;
            left: 20px; /* Al lado opuesto de la música */
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid #c5a059;
            color: #c5a059;
            font-family: 'Georgia', serif;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* --- NUEVO: Capa de fondo (Overlay) --- */
        #overlay-cronicas {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000; /* Por encima de todo */
            justify-content: center;
            align-items: center;
        }

        /* --- NUEVO: El Pergamino --- */
        #pergamino {
            width: 0%; /* Empieza cerrado para la animación */
            height: 80%;
            background-color: #e2cba1; /* Color papel viejo */
            border: 2px solid #5d4037;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: width 0.8s ease-in-out; /* Animación de apertura */
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #pergamino.abierto {
            width: 80%; /* Ancho final al abrirse */
        }

        /* Contenido dentro del pergamino */
        #contenido-cronicas {
            opacity: 0;
            transition: opacity 0.5s ease 0.8s; /* Aparece después de que abra el pergamino */
            color: #2b1d0e;
            font-family: 'Georgia', serif;
        }

        #pergamino.abierto #contenido-cronicas {
            opacity: 1;
        }

        .boton-cerrar {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
        }

        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="controles-musica" onclick="toggleMusica()">
        <span id="icono-musica" style="font-size: 24px;">🔇</span>
    </div>

    <div id="boton-cronicas" onclick="abrirCronicas()">📜 CRÓNICAS</div>

    <div id="overlay-cronicas">
        <div id="pergamino">
            <span class="boton-cerrar" onclick="cerrarCronicas()">✖</span>
            <div id="contenido-cronicas">
                <h1 style="border-bottom: 2px solid #5d4037;">Crónicas del Dominio</h1>
                
                <div id="linea-tiempo" style="margin-top: 30px;">
                    <div class="entrada" style="width: 250px;">
                        <h3>El Dominio de Sangre</h3>
                        <p>Finales de la era 1</p>
                        <button>Leer PDF</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ... (Tu configuración de mapa existente se mantiene igual)
        var ancho = 2114; 
        var alto = 744;  
        var url = 'map.png'; 

        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0,
            maxZoom: 3,
            attributionControl: false,
            zoomSnap: 0.1 
        });

        var bounds = [[0, 0], [alto, ancho]];
        L.imageOverlay(url, bounds).addTo(map);
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);

        // --- NUEVAS FUNCIONES PARA CRÓNICAS ---
        function abrirCronicas() {
            const overlay = document.getElementById('overlay-cronicas');
            const pergamino = document.getElementById('pergamino');
            
            overlay.style.display = 'flex'; // Muestra el fondo oscuro
            setTimeout(() => {
                pergamino.classList.add('abierto'); // Inicia la animación de apertura
            }, 10);
        }

        function cerrarCronicas() {
            const pergamino = document.getElementById('pergamino');
            const overlay = document.getElementById('overlay-cronicas');
            
            pergamino.classList.remove('abierto'); // Cierra el pergamino
            setTimeout(() => {
                overlay.style.display = 'none'; // Oculta el fondo tras la animación
            }, 800);
        }

        // --- FUNCIÓN DE MÚSICA (Igual que la tuya) ---
        var musica = document.getElementById("miMusica");
        var icono = document.getElementById("icono-musica");

        function toggleMusica() {
            if (musica.paused) {
                let playPromise = musica.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        icono.innerHTML = "🔊";
                    }).catch(error => {
                        console.log("Error: ", error);
                    });
                }
            } else {
                musica.pause();
                icono.innerHTML = "🔇";
            }
        }
    </script>
</body>
</html>
