<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de mi Novela - Crónicas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Estilos Base */
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #1a120c; 
            overflow: hidden;
        }

        /* Botón de Crónicas */
        #boton-cronicas {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid #c5a059;
            color: #c5a059;
            font-family: 'MedievalSharp', cursive;
            font-size: 18px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        #boton-cronicas:hover {
            background: #c5a059;
            color: black;
        }

        /* Overlay con Blur */
        #overlay-cronicas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        /* --- PERGAMINO REPARADO --- */
        #pergamino {
            width: 0%; 
            max-width: 1100px;
            aspect-ratio: 2114 / 744; /* Mantiene la forma del pergamino original */
            background: url('pergamino.png') no-repeat center center; /* REGRESAMOS A .PNG */
            background-size: 100% 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            
            /* Espaciado interno para que el texto no toque la madera */
            padding: 8% 15% 5% 15%; 
            
            box-sizing: border-box;
            transition: width 0.6s ease-in-out;
            overflow: hidden;
        }

        #pergamino.abierto {
            width: 90%; 
        }

        #contenido-cronicas {
            opacity: 0;
            width: 100%;
            height: 100%;
            color: #2b1d0e;
            font-family: 'Crimson Text', serif;
            transition: opacity 0.5s ease 0.6s;
            overflow-y: auto; /* Por si el texto es muy largo */
        }

        #contenido-cronicas h1 {
            font-family: 'MedievalSharp', cursive;
            font-size: clamp(20px, 4vw, 38px);
            margin: 0 0 15px 0;
            border-bottom: 2px dashed rgba(93, 64, 55, 0.3);
            text-align: center;
        }

        .seccion-biblioteca {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .entrada-libro {
            background: rgba(0, 0, 0, 0.05); 
            padding: 15px;
            border: 1px solid rgba(93, 64, 55, 0.2);
            border-radius: 4px;
            width: 240px;
            text-align: center;
        }

        .btn-leer {
            background: #5d4037;
            color: #e2cba1;
            padding: 8px 15px;
            font-family: 'MedievalSharp', cursive;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }

        .cerrar-x {
            position: absolute;
            top: 5%;
            right: 8%;
            font-size: 25px;
            cursor: pointer;
            color: #5d4037;
            font-weight: bold;
            z-index: 100;
        }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="boton-cronicas" onclick="abrirCronicas()">📜 CRÓNICAS</div>

    <div id="overlay-cronicas">
        <div id="pergamino">
            <span class="cerrar-x" onclick="cerrarCronicas()">✖</span>
            <div id="contenido-cronicas">
                <h1>Crónicas del Dominio</h1>
                <div class="seccion-biblioteca">
                    <div class="entrada-libro">
                        <h3>El Dominio de Sangre</h3>
                        <p>Finales de la Era I</p>
                        <a href="novela.pdf" target="_blank" class="btn-leer">Leer Manuscrito</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Configuración Mapa (asegúrate que tu mapa también se llame map.png o map.webp)
        var ancho = 2114; 
        var alto = 744;  
        var urlMapa = 'map.webp'; // Cambia a .png si tu mapa es png

        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 1,
            zoomSnap: 0.1,
            attributionControl: false
        });

        var bounds = [[0, 0], [alto, ancho]];
        L.imageOverlay(urlMapa, bounds).addTo(map);
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);

        function abrirCronicas() {
            const overlay = document.getElementById('overlay-cronicas');
            const pergamino = document.getElementById('pergamino');
            const contenido = document.getElementById('contenido-cronicas');
            overlay.style.display = 'flex';
            setTimeout(() => {
                pergamino.classList.add('abierto');
                contenido.style.opacity = "1";
            }, 10);
        }

        function cerrarCronicas() {
            const pergamino = document.getElementById('pergamino');
            const contenido = document.getElementById('contenido-cronicas');
            const overlay = document.getElementById('overlay-cronicas');
            contenido.style.opacity = "0";
            pergamino.classList.remove('abierto');
            setTimeout(() => { overlay.style.display = 'none'; }, 800);
        }
    </script>
</body>
</html>
