<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de mi Novela</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000000;
        }
    </style>
</head>
<body>
<!-- Reproductor de música -->
<audio id="miMusica" loop>
    <source src="musica.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<!-- Botón flotante para controlar el sonido -->
<div id="controles-musica" style="position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 50%; cursor: pointer; border: 1px solid white;">
    <span id="icono-musica" onclick="toggleMusica()" style="font-size: 24px;">🔇</span>
</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Configuramos el mapa para usar coordenadas planas
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3, // Un poco más de margen para alejar
            maxZoom: 2
        });

        var ancho = 2114; 
        var alto = 744;  
        // Asegúrate de que tu imagen se llame exactamente así en GitHub
        var url = 'map.png'; 

        // 2. LA SOLUCIÓN: Definimos los límites usando directamente tus píxeles [Y, X]
        var bounds = [[0, 0], [alto, ancho]];

        // 3. Colocamos tu imagen
        L.imageOverlay(url, bounds).addTo(map);

        // 4. Forzamos a la cámara a centrarse exactamente en esos límites
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);

        // 5. MARCADOR INTERACTIVO
        // Lo puse en [384, 704] para que aparezca justo en el centro del mapa
        L.marker([384, 704]).addTo(map).bindPopup("<b>La Nueva Casa de Moi</b><br>El refugio de la familia tras lo sucedido con Ulfric. Ojalá Thief y Rafita traigan provisiones.");
        
    </script>
</body>
</html>
