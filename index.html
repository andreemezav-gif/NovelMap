<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de mi Novela</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* Se cambió el fondo a un café muy oscuro para disimular las franjas y que se funda con el mapa */
            background-color: #1a120c; 
        }
        #controles-musica {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #c5a059;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1;
        }
        /* Oculta forzosamente la atribución de Leaflet y la bandera */
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="controles-musica" onclick="toggleMusica()">
        <span id="icono-musica" style="font-size: 24px;">🔇</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. CONFIGURACIÓN DEL MAPA
        var ancho = 2114; 
        var alto = 744;  
        var url = 'map.png'; // Nombre exacto según tu captura

        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0,
            maxZoom: 3, // Aumentado ligeramente para permitir acercarse más
            attributionControl: false,
            zoomSnap: 0.1 // Permite ajustes de zoom más suaves
        });

        var bounds = [[0, 0], [alto, ancho]];
        L.imageOverlay(url, bounds).addTo(map);

        // Centramos y forzamos el zoom inicial
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);

        // EL MARCADOR AZUL FUE ELIMINADO DE AQUÍ

        // 2. FUNCIÓN DE MÚSICA
        var musica = document.getElementById("miMusica");
        var icono = document.getElementById("icono-musica");

        function toggleMusica() {
            if (musica.paused) {
                // El .catch ayuda a evitar errores en la consola si el navegador bloquea la acción
                let playPromise = musica.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        icono.innerHTML = "🔊";
                    }).catch(error => {
                        console.log("El navegador bloqueó la reproducción: ", error);
                    });
                }
            } else {
                musica.pause();
                icono.innerHTML = "🔇";
            }
        }
    </script>
</body>
</html>
</body>
</html>
