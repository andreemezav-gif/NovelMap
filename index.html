<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de mi Novela</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #0b0d0f; /* Color oscuro que combina con el mapa */
        }
        #controles-musica {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #c5a059;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            line-height: 1;
        }
    </style>
</head>
<body>

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="controles-musica" onclick="toggleMusica()">
        <span id="icono-musica" style="font-size: 24px;">🔇</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. CONFIGURACIÓN DEL MAPA
        var ancho = 2114; 
        var alto = 744;  
        var url = 'map.png'; // Nombre exacto según tu captura

        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0,   // Cambiado a 0 para que no se vea tanto fondo negro
            maxZoom: 2,
            attributionControl: false
        });

        var bounds = [[0, 0], [alto, ancho]];
        L.imageOverlay(url, bounds).addTo(map);

        // Centramos y forzamos el zoom inicial
        map.fitBounds(bounds);
        map.setMaxBounds(bounds);
        map.setZoom(0); // Esto hace que se vea más grande al cargar

        // 2. MARCADOR
        L.marker([372, 1057]).addTo(map)
            .bindPopup("<b>Dominio Calverian</b><br>La Nueva Casa de Moi.");

        // 3. FUNCIÓN DE MÚSICA (Esto es lo que faltaba)
        var musica = document.getElementById("miMusica");
        var icono = document.getElementById("icono-musica");

        function toggleMusica() {
            if (musica.paused) {
                musica.play();
                icono.innerHTML = "🔊";
            } else {
                musica.pause();
                icono.innerHTML = "🔇";
            }
        }
    </script>
</body>
</html>
